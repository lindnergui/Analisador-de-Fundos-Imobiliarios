[theme]
base = "dark"
primaryColor = "#2ecc71"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "sans serif"

[client]
showErrorDetails = false
showWarningOnDirectExecution = false

[server]
headless = true
# IMPORTANTE: runOnSave = false é necessário
# Se ativar (true), o Streamlit faz rerun automático e causa erros
# O app funciona perfeitamente com runOnSave = false (padrão)
runOnSave = false
maxUploadSize = 200
